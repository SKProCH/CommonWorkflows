name: Build and publish

on:
  workflow_call:
    inputs:
      publish-nightly:
        description: 'Should nightly versions be published to feeds'
        required: true
        type: boolean
      only-build:
        description: 'If this should only build package, and disable any publishing'
        required: false
        type: boolean
        default: false
      dotnet-version:
        description: 'Optional SDK version(s) to use. If not provided, will install global.json version when available. Examples: 2.2.104, 3.1, 3.1.x, 3.x, 6.0.2xx'
        required: true
        type: string
      workloads:
        description: 'Optional workload list to install'
        required: false
        type: string
      build-command:
        description: 'Overrides a build command. Do not include dotnet in start'
        required: false
        type: string
    secrets:
      NUGET_USER:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Build and Publish
        uses: SKProCH/CommonWorkflows/actions/build-publish@main
        with:
          publish-nightly: ${{ inputs.publish-nightly }}
          only-build: ${{ inputs.only-build }}
          build-command: ${{ inputs.build-command }}
          nuget-user: ${{ secrets.NUGET_USER }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
